name: Build Android 14 APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out exact PR commit
        uses: actions/checkout@v4
        with:
          repository: esmeraldas63/boox-rapid-draw
          ref: 46aaf8e8c31f3e0e5afd1519fea01e3e30945f42

      - name: Verify commit
        run: |
          test "$(git rev-parse HEAD)" = "46aaf8e8c31f3e0e5afd1519fea01e3e30945f42"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build installable debug APK
        run: ./gradlew --no-daemon clean assembleDebug

      - name: Rename APK and generate checksum
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             Boox-Rapid-Draw-0.0.6-alpha-Android14-debug.apk
          sha256sum Boox-Rapid-Draw-0.0.6-alpha-Android14-debug.apk \
             > Boox-Rapid-Draw-0.0.6-alpha-Android14-debug.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Boox-Rapid-Draw-Android14
          path: |
            Boox-Rapid-Draw-0.0.6-alpha-Android14-debug.apk
            Boox-Rapid-Draw-0.0.6-alpha-Android14-debug.apk.sha256
          if-no-files-found: error
          retention-days: 30
